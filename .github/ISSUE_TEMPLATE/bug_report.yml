name: Bug Report
description: Report a bug or unexpected behavior in the gh-pms plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please fill out the form below.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: From `plugins/gh-pms/.claude-plugin/plugin.json` (or output of `/plugin list`)
      placeholder: "e.g., 0.2.0"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code Version
      description: Output of `claude --version`
      placeholder: "e.g., 2.4.0"
    validations:
      required: true

  - type: input
    id: gh-cli-version
    attributes:
      label: gh CLI Version
      description: Output of `gh --version` (first line)
      placeholder: "e.g., gh version 2.60.1"

  - type: dropdown
    id: surface
    attributes:
      label: Where does the bug happen?
      multiple: true
      options:
        - A specific skill (gh-init, gh-plan, gh-feature, gh-bug, gh-current, gh-advance, gh-review, gh-relate, gh-status, etc.)
        - Hooks (UserPromptSubmit / PreToolUse / Stop)
        - Workflow / gate validation
        - lib/ghcall.sh
        - lib/validate-evidence.sh
        - Issue templates / PR template
        - Documentation
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Specific skill (if applicable)
      placeholder: "e.g., gh-advance"

  - type: dropdown
    id: target-host
    attributes:
      label: Repo / org context
      multiple: true
      options:
        - Org repo with Issue Types enabled
        - Org repo without Issue Types
        - User-account repo
        - With Projects v2 attached
        - Without Projects v2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1. Run `/gh-pms:gh-…`
        2. With prompt `…`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots / Hook output
      description: Paste any relevant logs (anonymize repo names if needed), stack traces, or screenshots.
