# gh-pms default workflow
# Mirrors the Orchestra MCP gate model — but uses GitHub's NATIVE primitives
# (issue types, projects v2, milestones, sub-issues, relationships) wherever
# available, falling back to labels when not.
#
# Statuses live in a Projects v2 single-select "Status" field if a project is
# attached; otherwise as `status:<name>` labels (legacy fallback). Transitions
# update both, atomically.

statuses:
  - name: todo
    description: Backlogged, not started
  - name: in-progress
    description: Active development
  - name: ready-for-testing
    description: Code complete, awaiting QA
  - name: in-testing
    description: Tests being run
  - name: ready-for-docs
    description: Tests pass, awaiting documentation
  - name: in-docs
    description: Documentation in progress
  - name: documented
    description: Docs complete, awaiting review
  - name: in-review
    description: PR open, awaiting user approval
  - name: blocked
    description: Halted by external dependency
  - name: done
    description: Merged + verified

# Free transitions (no gate, no evidence) — always allowed
free_transitions:
  - [todo, in-progress]
  - [in-progress, blocked]
  - [blocked, in-progress]
  - [ready-for-testing, in-testing]
  - [ready-for-docs, in-docs]

# Gated transitions — require evidence comment with structured ## Sections
gates:
  - id: gate1
    from: in-progress
    to: ready-for-testing
    skip_for_kinds: []
    required_sections:
      - name: Summary
        min_chars: 10
      - name: Changes
        min_chars: 10
        require_file_paths: true
      - name: Verification
        min_chars: 10
    description: "Code complete. Summary of work, list of changed files, how to verify."

  - id: gate2
    from: in-testing
    to: ready-for-docs
    skip_for_kinds: []
    required_sections:
      - name: Summary
        min_chars: 10
      - name: Results
        min_chars: 10
      - name: Coverage
        min_chars: 10
    description: "Tests passed. Summary, results table, coverage stats."

  - id: gate3
    from: in-docs
    to: documented
    skip_for_kinds: [bug, hotfix, testcase]
    required_sections:
      - name: Summary
        min_chars: 10
      - name: Location
        min_chars: 10
        require_file_paths: true
    description: "Docs written. Summary, file paths to new docs."

  - id: gate4
    from: documented
    to: in-review
    skip_for_kinds: []
    required_sections:
      - name: Summary
        min_chars: 10
      - name: Quality
        min_chars: 10
      - name: Checklist
        min_chars: 10
        require_file_paths: true
    description: "Self-review before user approval. Summary, quality notes, file checklist."
    requires_pr: true
    requires_passing_checks: true   # refuse the transition if any required PR check is failing
    check_override_section: "Check overrides"   # if --ignore-checks is used, the reason is recorded here

  - id: gate5
    from: in-review
    to: done
    skip_for_kinds: []
    required_user_approval: true
    description: "User approves via AskUserQuestion. PR merge auto-closes the issue."

# Severity scale — canonical source of truth for the `severity:*` label set
# and the Project v2 `Severity` field. Applies to ALL issue kinds, not just
# bugs (a P0 feature blocking launch is meaningfully different from a polish
# item). Skills accept an optional `severity` input; default is `medium`.
# Per-repo overrides are allowed — extend or replace the list to fit your
# scale, but keep `default` pointing to a value present in the list.
severities:
  default: medium
  values:
    - name: critical
      label: severity:critical
      project_field_value: Critical
      description: P0 — drop everything
    - name: high
      label: severity:high
      project_field_value: High
      description: P1 — fix this sprint
    - name: medium
      label: severity:medium
      project_field_value: Medium
      description: P2 — schedule
    - name: low
      label: severity:low
      project_field_value: Low
      description: P3 — nice to have

# Programmatic guardrails
guardrails:
  wip_limit: 1
  wip_scope: assignee
  wip_violation_message: "You already have an issue in status:in-progress assigned to you. Finish it before starting another."
  gate_cooldown_seconds: 30
  cooldown_violation_message: "Gates require at least 30s between transitions. Slow down — verify your evidence."

# Branching policy — every feature must end with a PR linked to its issue.
# Enforced by gh-current (auto-creates a branch on start), gh-advance (Gate 1
# refuses if work is on the protected base branch), and gh-push (refuses to
# push from the protected base branch).
branching:
  # Branch protection — work for the kinds listed here must NOT happen on the
  # protected base. gh-current branches off automatically; gh-push refuses to
  # ship from the base.
  protected_base:
    - main
    - master
  # Kinds that require a feature branch + PR. Bootstrapping commits without
  # an issue number ("chore: setup CI", "docs: add LICENSE") are exempt.
  pr_required_kinds:
    - feature
    - bug
    - hotfix
    - chore
    - testcase
  # Branch name template — substituted on gh-current. {kind_short} maps each
  # kind to a short prefix (feat / fix / chore / hotfix / test). {slug} comes
  # from the issue title (lowercased, non-alphanum → '-').
  branch_template: "{kind_short}/{number}-{slug}"
  kind_short:
    feature: feat
    bug: fix
    hotfix: hotfix
    chore: chore
    testcase: test
  # PR body must contain `Closes #N` (case-insensitive) so merge auto-closes
  # the issue. Enforced by the pre-pr-create hook + gh-push.
  pr_must_close_issue: true
  # On Gate 1, refuse the transition if HEAD is on the protected base. This
  # forces feature work onto a real branch before "ready-for-testing".
  gate1_refuses_protected_base: true

# GitHub native features — auto-detected per repo on `gh-init`
github_features:
  # Use GitHub native Issue Types (Feature / Bug / Task) when the repo's owner
  # is an org that has them enabled. Falls back to `type:*` labels otherwise.
  issue_types: auto    # auto | true | false

  # Use a Projects v2 board for Status tracking (and other custom fields).
  # When enabled, transitions update the project's "Status" field; status
  # labels are still applied for visibility.
  projects: auto       # auto | true | false

  # Use Milestones for plans. Plans = milestones; sub-issues attach via
  # `--milestone` flag. Milestones auto-close when all linked issues close.
  milestones: true

  # If a feature isn't available, use labels for that dimension.
  fallback_to_labels: true

  # Project name used by gh-init when creating/attaching the project.
  project_name: "gh-pms"

  # Custom fields the project should expose (created by gh-init).
  project_fields:
    - { name: "Status",   type: "single_select", options: ["Todo", "In Progress", "Ready for Testing", "In Testing", "Ready for Docs", "In Docs", "Documented", "In Review", "Blocked", "Done"] }
    - { name: "Severity", type: "single_select", options: ["Critical", "High", "Medium", "Low"] }
    - { name: "Effort",   type: "single_select", options: ["S", "M", "L", "XL"] }
    - { name: "Service",  type: "single_select", options: ["app", "bridge", "studio", "edge", "db", "devops"] }

# Mapping from gh-pms `kind` to GitHub native Issue Type name.
# When issue_types is enabled, the plugin sets the issue type instead of
# applying a `type:*` label.
kind_to_issue_type:
  feature:  "Feature"
  bug:      "Bug"
  hotfix:   "Bug"        # GitHub default set has no Hotfix; map to Bug + label `priority:critical`
  chore:    "Task"
  testcase: "Task"       # plus label `type:testcase` for filtering
  plan:     null         # plans are milestones, not issues with type
  prd:      null         # PRDs are documents — no issue type
  request:  "Task"       # plus label `type:request`

# Issue relationships — encoded in body sections AND via GitHub's native
# cross-reference / sub-issue / "Tracked by" features.
relationships:
  - name: depends_on
    body_section: "Depends on"
    direction: outbound        # this issue depends on others
    body_format: "- {target}"  # e.g. "- #42"
    creates_native_link: false
  - name: blocks
    body_section: "Blocks"
    direction: outbound
    body_format: "- {target}"
    creates_native_link: false
  - name: related_to
    body_section: "Related to"
    direction: bidirectional
    body_format: "- {target}"
    creates_native_link: false
  - name: duplicate_of
    body_section: "Duplicate of"
    direction: outbound
    body_format: "{target}"
    creates_native_link: false   # we close the issue with `not planned` reason
    closes_self: true            # marking duplicate closes this issue
  - name: closes               # only valid in PR bodies
    body_section: null
    direction: outbound
    body_format: "Closes {target}"
    creates_native_link: true    # native GitHub keyword auto-closes on merge
    pr_only: true

# Issue kinds (when types not available, applied as `type:<kind>` label)
kinds:
  - name: feature
    description: New functionality or enhancement
    parent: plan
  - name: bug
    description: Defect report
    parent: feature
  - name: hotfix
    description: Urgent fix
    parent: feature
  - name: chore
    description: Maintenance / refactoring / CI work
    parent: null
  - name: testcase
    description: QA test case linked to a parent feature
    parent: feature
  - name: plan
    description: Multi-feature plan, broken down into sub-issues
    parent: prd
  - name: prd
    description: Product requirement doc, parent of plans
    parent: null
  - name: request
    description: Mid-flow user ask, deferred for triage
    parent: null
